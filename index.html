<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./images/f.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>PresentSeek-The Attendance Management System.......</title>
</head>

<body>
    <!-- header -->
    <div class="banner">
        <!-- Nav Bar -->
        <div class="nav">
            <div class="fis">
                <img src="./images/logo.png" alt="" class="nav_logo">
            </div>
            <div>
                <button class="sec">Home</button>
                <button class="sec">Contact us</button>
            </div>
        </div>
        <!-- login -->
        <div class="main">
            <div class="box">
                <h1 >Log In Form</h1>
                <div class="row">
                    <input class="cred" type="text" required placeholder="Enter your Teacher or Student ID">
                </div>
                <div class="row">
                    <input class="cred" type="password" required placeholder="Password">
                </div>
                <div class="row">
                    <div class="rf">
                        <div class="checkbox">
                            <input type="checkbox" id="remember-me">
                            <label for="remember-me">Remember me</label>
                        </div>
                        <div class="pass-link">
                            <a href="#">Forgot password?</a>
                        </div>
                    </div>
                </div>
                <a href="teacher_home.html">
                    <button class="row btn">
                        Log In
                    </button>
                </a>
                
                <div class="row">
                    Not a member? <a href="#">Signup now</a>
                </div>
            </div>
        </div>
        <!-- banner -->
        <div class="contents">
        </div>
    </div>
    
</body>

</html>
